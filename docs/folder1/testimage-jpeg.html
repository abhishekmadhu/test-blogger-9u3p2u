<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>testimage.jpeg</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');

:root {
  --text: #2c2416;
  --bg: #faf8f4;
  --surface: #ffffff;
  --border: #ddd5c8;
  --accent: #8b4513;
  --accent-hover: #6b3410;
  --code-bg: #f0ebe3;
  --broken-link: #b8a99a;
  --heading-color: #3d2b1f;
  --footer-color: #8b7d6b;
  --max-width: 44rem;
  --font-body: 'EB Garamond', 'Georgia', 'Times New Roman', serif;
  --font-heading: 'EB Garamond', 'Georgia', serif;
  --font-code: 'Menlo', 'Consolas', 'Courier New', monospace;
  --font-size: 1.125rem;
  --line-height: 1.8;
}


    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      font-size: var(--font-size);
      line-height: var(--line-height);
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    nav {
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      color: var(--heading-color, var(--text));
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }

    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.2rem; }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }

    a.broken-link {
      color: var(--broken-link);
      text-decoration: line-through;
      cursor: not-allowed;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1rem 0;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    code {
      font-family: var(--font-code);
      font-size: 0.875em;
    }

    :not(pre) > code {
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.925rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    th {
      background: var(--code-bg);
      font-weight: 600;
    }

    blockquote {
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      border-left: 3px solid var(--accent);
      background: var(--code-bg);
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    ul, ol {
      padding-left: 1.5rem;
    }

    li {
      margin-bottom: 0.25rem;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--footer-color, #6b7280);
    }

    /* Index page styles */
    .page-list {
      list-style: none;
      padding: 0;
    }

    .page-list li {
      margin-bottom: 0.35rem;
    }

    .folder-group {
      margin-bottom: 1.5rem;
    }

    .folder-group h2 {
      font-size: 1.1rem;
      color: var(--footer-color, #6b7280);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/test-blogger-9u3p2u/">&#x2190; All Pages</a>
    </nav>
    <article>
      <h1>testimage.jpeg</h1>

    </article>
    <footer>
      Generated from Obsidian notes
    </footer>
  </div>
</body>
</html>
